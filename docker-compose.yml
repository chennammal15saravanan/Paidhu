version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: paidhu_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-supersecretpaidhudb}
      MYSQL_DATABASE: paidhu_db
    ports:
      - "3308:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./server/init.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: paidhu_backend
    restart: always
    ports:
      - "5001:5000"
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=${DB_PASSWORD:-supersecretpaidhudb}
      - DB_NAME=paidhu_db
      - JWT_SECRET=supersecretpaidhukey123
    depends_on:
      - db

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: paidhu_frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5001
    depends_on:
      - backend

volumes:
  db_data:
